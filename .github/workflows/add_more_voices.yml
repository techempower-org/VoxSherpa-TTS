name: Add International Voices to Release

on:
  workflow_dispatch:
    inputs:
      target_release_tag:
        description: 'Apne us release ka tag jisme models add karne hain'
        required: true
        default: 'piper-models-v1'

permissions:
  contents: write

jobs:
  upload-more-voices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Temporary Directory
        run: mkdir -p extra_models

      - name: Download Germany and Brazil Piper Models from Hugging Face
        run: |
          cd extra_models
          echo "Fetching clean fp32 models directly from official Hugging Face..."
          
          HF_BASE="https://huggingface.co/csukuangfj/sherpa-onnx-tts-models/resolve/main"
          
          # 1. Germany (German) - Thorsten Medium fp32
          curl -L -O "${HF_BASE}/piper-vits-de_DE-thorsten-medium/vits-piper-de_DE-thorsten-medium.onnx"
          curl -L -O "${HF_BASE}/piper-vits-de_DE-thorsten-medium/tokens.txt"
          mv vits-piper-de_DE-thorsten-medium.onnx de_DE-thorsten-medium.onnx
          mv tokens.txt de_DE-thorsten-medium.tokens.txt
          
          # 2. Brazil (Portuguese) - Faber Medium fp32
          curl -L -O "${HF_BASE}/piper-vits-pt_BR-faber-medium/vits-piper-pt_BR-faber-medium.onnx"
          curl -L -O "${HF_BASE}/piper-vits-pt_BR-faber-medium/tokens.txt"
          mv vits-piper-pt_BR-faber-medium.onnx pt_BR-faber-medium.onnx
          mv tokens.txt pt_BR-faber-medium.tokens.txt

      - name: Upload New Assets to Existing Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd extra_models
          echo "Uploading international models to your repository release..."
          
          # files ko existing release me upload karne ke liye 'upload' command use hoti hai
          gh release upload ${{ github.event.inputs.target_release_tag }} * \
            --repo CodeBySonu95/VoxSherpa-TTS \
            --clobber
