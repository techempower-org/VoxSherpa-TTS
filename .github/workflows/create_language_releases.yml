name: Generate Language-Specific Piper Releases

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Select the language release to generate'
        required: true
        type: choice
        options:
          # European Languages
          - 'German (de_DE)'
          - 'French (fr_FR)'
          - 'Spanish ES (es_ES)'
          - 'Spanish AR (es_AR)'
          - 'Spanish MX (es_MX)'
          - 'Italian (it_IT)'
          - 'Portuguese BR (pt_BR)'
          - 'Portuguese PT (pt_PT)'
          - 'Russian (ru_RU)'
          - 'Polish (pl_PL)'
          - 'Dutch (nl_NL)'
          - 'Ukrainian (uk_UA)'
          - 'Romanian (ro_RO)'
          - 'Swedish (sv_SE)'
          - 'Norwegian (nb_NO)'
          - 'Danish (da_DK)'
          - 'Finnish (fi_FI)'
          - 'Czech (cs_CZ)'
          - 'Slovak (sk_SK)'
          - 'Hungarian (hu_HU)'
          - 'Croatian (hr_HR)'
          - 'Serbian (sr_RS)'
          - 'Slovenian (sl_SI)'
          - 'Bulgarian (bg_BG)'
          - 'Greek (el_GR)'
          - 'Catalan (ca_ES)'
          - 'Basque (eu_ES)'
          - 'Albanian (sq_AL)'
          - 'Latvian (lv_LV)'
          - 'Lithuanian (lt_LT)'
          - 'Estonian (et_EE)'
          - 'Icelandic (is_IS)'
          - 'Luxembourgish (lb_LU)'
          - 'Georgian (ka_GE)'
          # Asian / Other Languages
          - 'Hindi (hi_IN)'
          - 'Arabic (ar)'
          - 'Turkish (tr_TR)'
          - 'Vietnamese (vi_VN)'
          - 'Korean (ko_KR)'
          - 'Indonesian (id_ID)'
          - 'Kazakh (kk_KZ)'
          - 'Persian (fa_IR)'
          - 'Nepali (ne_NP)'
          - 'Malayalam (ml_IN)'
          - 'Swahili (sw)'
          - 'Welsh (cy_GB)'
          - 'Urdu (ur_PK)'
          - 'Kurdish (kmr_TR)'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Workspace
        run: mkdir -p target_voice_pack

      - name: Fetch and Extract Assets from Official GitHub Releases
        run: |
          cd target_voice_pack
          echo "Processing selection: ${{ github.event.inputs.language }}"

          GH_BASE="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models"

          download_and_extract() {
            local model_dir="$1"
            local new_prefix="$2"
            echo "Downloading $model_dir.tar.bz2 ..."
            wget -q "${GH_BASE}/${model_dir}.tar.bz2"
            echo "Extracting..."
            tar -xf "${model_dir}.tar.bz2"
            mv "${model_dir}"/*.onnx "${new_prefix}.onnx"
            if [ -f "${model_dir}/tokens.txt" ]; then
              mv "${model_dir}/tokens.txt" "${new_prefix}.tokens.txt"
            else
              mv "${model_dir}"/*.txt "${new_prefix}.tokens.txt" 2>/dev/null || true
            fi
            rm -rf "${model_dir}" "${model_dir}.tar.bz2"
            echo "Done: ${new_prefix}"
          }

          case "${{ github.event.inputs.language }}" in

            # ── GERMAN ──────────────────────────────────────────────────────
            "German (de_DE)")
              echo "TAG_NAME=piper-de"        >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper German Models (de_DE)" >> $GITHUB_ENV
              echo "LANG_NAME=German"         >> $GITHUB_ENV
              download_and_extract "vits-piper-de_DE-thorsten-low"              "de_DE-thorsten-low"
              download_and_extract "vits-piper-de_DE-thorsten-medium"           "de_DE-thorsten-medium"
              download_and_extract "vits-piper-de_DE-thorsten-high"             "de_DE-thorsten-high"
              download_and_extract "vits-piper-de_DE-thorsten_emotional-medium" "de_DE-thorsten_emotional-medium"
              download_and_extract "vits-piper-de_DE-kerstin-low"               "de_DE-kerstin-low"
              download_and_extract "vits-piper-de_DE-ramona-low"                "de_DE-ramona-low"
              download_and_extract "vits-piper-de_DE-eva_k-x_low"              "de_DE-eva_k-x_low"
              download_and_extract "vits-piper-de_DE-karlsson-low"              "de_DE-karlsson-low"
              download_and_extract "vits-piper-de_DE-pavoque-low"               "de_DE-pavoque-low"
              download_and_extract "vits-piper-de_DE-miro-high"                "de_DE-miro-high"
              download_and_extract "vits-piper-de_DE-dii-high"                 "de_DE-dii-high"
              download_and_extract "vits-piper-de_DE-glados-low"               "de_DE-glados-low"
              download_and_extract "vits-piper-de_DE-glados-medium"            "de_DE-glados-medium"
              download_and_extract "vits-piper-de_DE-glados-high"              "de_DE-glados-high"
              download_and_extract "vits-piper-de_DE-glados_turret-low"        "de_DE-glados_turret-low"
              download_and_extract "vits-piper-de_DE-glados_turret-medium"     "de_DE-glados_turret-medium"
              download_and_extract "vits-piper-de_DE-glados_turret-high"       "de_DE-glados_turret-high"
              ;;

            # ── FRENCH ──────────────────────────────────────────────────────
            "French (fr_FR)")
              echo "TAG_NAME=piper-fr"        >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper French Models (fr_FR)" >> $GITHUB_ENV
              echo "LANG_NAME=French"         >> $GITHUB_ENV
              download_and_extract "vits-piper-fr_FR-gilles-low"       "fr_FR-gilles-low"
              download_and_extract "vits-piper-fr_FR-miro-high"        "fr_FR-miro-high"
              download_and_extract "vits-piper-fr_FR-siwis-low"        "fr_FR-siwis-low"
              download_and_extract "vits-piper-fr_FR-siwis-medium"     "fr_FR-siwis-medium"
              download_and_extract "vits-piper-fr_FR-tjiho-model1"     "fr_FR-tjiho-model1"
              download_and_extract "vits-piper-fr_FR-tjiho-model2"     "fr_FR-tjiho-model2"
              download_and_extract "vits-piper-fr_FR-tjiho-model3"     "fr_FR-tjiho-model3"
              download_and_extract "vits-piper-fr_FR-tom-medium"       "fr_FR-tom-medium"
              download_and_extract "vits-piper-fr_FR-upmc-medium"      "fr_FR-upmc-medium"
              ;;

            # ── SPANISH ES ──────────────────────────────────────────────────
