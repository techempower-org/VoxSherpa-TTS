      - name: Generate Release Notes Markdown
        run: |
          cd target_voice_pack
          cat << EOF > release_notes.md
          # Piper ${{ env.LANG_NAME }} Models Pack

          Pre-compiled **${{ env.LANG_NAME }} Piper voice models** for the Sherpa-ONNX TTS engine.

          ## Contents

          - Full-precision (fp32) ONNX weights
          - Each voice: \`{lang}-{voice}-{quality}.onnx\` + \`{lang}-{voice}-{quality}.tokens.txt\`
          - Compatible with sherpa-onnx Android integration

          ## Upstream Source

          All weights pulled directly from [k2-fsa/sherpa-onnx TTS Models](https://github.com/k2-fsa/sherpa-onnx/releases/tag/tts-models)
          EOF

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd target_voice_pack
          echo "Publishing release for ${{ env.LANG_NAME }}..."
          gh release create ${{ env.TAG_NAME }} *.onnx *.txt \
            --title "${{ env.RELEASE_TITLE }}" \
            --notes-file release_notes.md \
            --repo CodeBySonu95/VoxSherpa-TTS
