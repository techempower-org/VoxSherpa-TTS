name: Generate Language-Specific Piper Releases

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Select the language release to generate'
        required: true
        type: choice
        options:
          - 'Germany (German)'
          - 'Brazil (Portuguese)'
          - 'France (French)'
          - 'Spain (Spanish)'
          - 'Italy (Italian)'
          - 'Japan (Japanese)'
          - 'Russia (Russian)'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Workspace
        run: mkdir -p target_voice_pack

      - name: Fetch and Extract Assets from Official GitHub Releases
        run: |
          cd target_voice_pack
          echo "Processing selection: ${{ github.event.inputs.language }}"
          
          # Base URL for official k2-fsa GitHub releases
          GH_BASE="https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models"
          
          # Helper function to download, extract, and clean up
          download_and_extract() {
            local model_dir="$1"
            local new_prefix="$2"
            
            echo "Downloading $model_dir.tar.bz2 from GitHub..."
            wget -q "${GH_BASE}/${model_dir}.tar.bz2"
            
            echo "Extracting model files..."
            tar -xf "${model_dir}.tar.bz2"
            
            echo "Moving and renaming essential files..."
            mv "${model_dir}/${model_dir}.onnx" "${new_prefix}.onnx"
            mv "${model_dir}/tokens.txt" "${new_prefix}.tokens.txt"
            
            echo "Cleaning up temporary files..."
            rm -rf "${model_dir}" "${model_dir}.tar.bz2"
            echo "Success: ${new_prefix} ready!"
          }

          case "${{ github.event.inputs.language }}" in
            "Germany (German)")
              echo "TAG_NAME=piper-de-fp32" >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper German ONNX Models Pack (de-fp32)" >> $GITHUB_ENV
              echo "LANG_NAME=German" >> $GITHUB_ENV
              download_and_extract "vits-piper-de_DE-thorsten-medium" "de_DE-thorsten-medium"
              ;;
              
            "Brazil (Portuguese)")
              echo "TAG_NAME=piper-pt-fp32" >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper Portuguese ONNX Models Pack (pt-fp32)" >> $GITHUB_ENV
              echo "LANG_NAME=Portuguese" >> $GITHUB_ENV
              download_and_extract "vits-piper-pt_BR-faber-medium" "pt_BR-faber-medium"
              ;;
              
            "France (French)")
              echo "TAG_NAME=piper-fr-fp32" >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper French ONNX Models Pack (fr-fp32)" >> $GITHUB_ENV
              echo "LANG_NAME=French" >> $GITHUB_ENV
              download_and_extract "vits-piper-fr_FR-siwis-medium" "fr_FR-siwis-medium"
              ;;
              
            "Spain (Spanish)")
              echo "TAG_NAME=piper-es-fp32" >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper Spanish ONNX Models Pack (es-fp32)" >> $GITHUB_ENV
              echo "LANG_NAME=Spanish" >> $GITHUB_ENV
              download_and_extract "vits-piper-es_ES-sharvard-medium" "es_ES-sharvard-medium"
              ;;
              
            "Italy (Italian)")
              echo "TAG_NAME=piper-it-fp32" >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper Italian ONNX Models Pack (it-fp32)" >> $GITHUB_ENV
              echo "LANG_NAME=Italian" >> $GITHUB_ENV
              download_and_extract "vits-piper-it_IT-ricco-medium" "it_IT-ricco-medium"
              ;;
              
            "Japan (Japanese)")
              echo "TAG_NAME=piper-ja-fp32" >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper Japanese ONNX Models Pack (ja-fp32)" >> $GITHUB_ENV
              echo "LANG_NAME=Japanese" >> $GITHUB_ENV
              download_and_extract "vits-piper-ja_JP-hina-medium" "ja_JP-hina-medium"
              ;;
              
            "Russia (Russian)")
              echo "TAG_NAME=piper-ru-fp32" >> $GITHUB_ENV
              echo "RELEASE_TITLE=Piper Russian ONNX Models Pack (ru-fp32)" >> $GITHUB_ENV
              echo "LANG_NAME=Russian" >> $GITHUB_ENV
              download_and_extract "vits-piper-ru_RU-dmitry-medium" "ru_RU-dmitry-medium"
              ;;
          esac

      - name: Generate Release Notes Markdown
        run: |
          cd target_voice_pack
          cat << EOF > release_notes.md
          # Piper ${{ env.LANG_NAME }} ONNX Models Pack (Full-Precision fp32)
          
          This release provides high-quality, pre-compiled **${{ env.LANG_NAME }} Piper voice models** optimized for the Sherpa-ONNX text-to-speech engine.
          
          ## What's New & Improved
          
          * **Full-Precision (fp32) Weights:** Upgraded from INT8-quantized models. Previous INT8 versions occasionally produced audible quantization fuzz/noise on certain Android devices. These fp32 models ensure crystal-clear audio output and resolve those audio artifact issues.
          * **Streamlined Single-File Structure:** Models have been extracted from upstream tarballs and re-hosted for direct, easy integration. Each voice is neatly packaged with just its essential files:
            * \`[model-name].onnx\`
            * \`[model-name].tokens.txt\`
          * **Strict Naming Convention:** Resolved latent naming collisions where distinct languages shared the same voice name. Files are now strictly prefixed with their respective language codes.
            * **Format:** \`{lang}-{voice}-{quality}.onnx\`
          
          ## Contents
          
          This release exclusively contains **Piper** models and their respective token text files.
          
          ## Credits & Upstream Source
          
          These weights are pulled directly from the upstream Sherpa-ONNX repository.
          * **Upstream Source:** [k2-fsa/sherpa-onnx TTS Models](https://github.com/k2-fsa/sherpa-onnx/releases/tag/tts-models)
          EOF

      - name: Publish Isolated Language Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd target_voice_pack
          echo "Publishing standalone release for ${{ env.LANG_NAME }}..."
          
          gh release create ${{ env.TAG_NAME }} *.onnx *.txt \
            --title "${{ env.RELEASE_TITLE }}" \
            --notes-file release_notes.md \
            --repo CodeBySonu95/VoxSherpa-TTS
